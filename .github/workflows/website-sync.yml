name: Sync Website to Separate Repo

on:
  push:
    branches:
      - main
    paths:
      - 'kcore-site/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate website repo token
        run: |
          if [ -z "${{ secrets.WEBSITE_REPO_TOKEN }}" ]; then
            echo "::error::Missing WEBSITE_REPO_TOKEN secret. Add a PAT with repo access to kcore-systems/website."
            exit 1
          fi

      - name: Checkout website repository
        uses: actions/checkout@v4
        with:
          repository: kcore-systems/website
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: website-repo
          fetch-depth: 0

      - name: Sync website files
        run: |
          cd website-repo
          git checkout main || git checkout -b main
          
          # Mirror website files while preserving the target repository git metadata.
          rsync -a --delete --exclude ".git/" ../kcore-site/ ./
          
          # Add and commit if there are changes
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync website from main repository [skip ci]"
            git push origin main
          fi

