name: Sync Website to Separate Repo

on:
  push:
    branches:
      - main
    paths:
      - 'kcore-site/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone website repository
        run: |
          if [ ! -d "website-repo" ]; then
            git clone https://github.com/kcore-systems/website.git website-repo || {
              echo "Repository doesn't exist yet. Create it first at https://github.com/kcore-systems/website"
              exit 1
            }
          fi

      - name: Sync website files
        run: |
          cd website-repo
          git checkout main || git checkout -b main
          
          # Copy website files
          cp -r ../kcore-site/* .
          
          # Add and commit if there are changes
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync website from main repository [skip ci]"
            git push origin main
          fi

