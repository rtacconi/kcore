name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Validate tag matches VERSION
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          version="$(tr -d '\n' < VERSION)"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must look like vX.Y.Z (got ${tag})"
            exit 1
          fi
          if [[ "${tag}" != "v${version}" ]]; then
            echo "::error::Tag ${tag} does not match VERSION (${version})"
            exit 1
          fi
          git fetch --tags --force origin
          tag_commit="$(git rev-parse "${tag}^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [[ "${tag_commit}" != "${head_commit}" ]]; then
            echo "::error::Checked out ${head_commit}, but ${tag} points to ${tag_commit}"
            exit 1
          fi

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        continue-on-error: true

      - name: Build and package release artifacts
        run: make release

      - name: Upload dist artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: kcore-${{ env.RELEASE_TAG }}-dist
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        run: make release-publish
        env:
          GH_TOKEN: ${{ github.token }}
