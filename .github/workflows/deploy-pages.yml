name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          exclude-paths: |
            .git
            .github
            api
            cmd
            internal
            node
            pkg
            proto
            scripts
            kcore-site
            kcore-tech
            modules
            test
            terraform-provider-kcore
            examples
            docs
            *.nix
            *.lock
            go.*
            Makefile
            README.md
            .gitignore

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

