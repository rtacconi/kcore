name: formal-checks

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kani:
    # Scope: ONLY the byte-loop path scanners in `kcore-sanitize`.
    # Three harnesses, ~30-45 s wall time end-to-end. Higher-level
    # sanitizers and parsers are covered by proptest in `cargo test`,
    # not Kani — see `.cursor/rules/kani-local-before-push.mdc` and
    # the `kani_proofs` module doc-comment in
    # `crates/kcore-sanitize/src/lib.rs`.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-kani-v1-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-kani-v1-

      - name: Cache kani-verifier toolchain
        id: cache-kani
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.cargo/bin/kani
            ~/.kani
          key: kani-verifier-0.67.0-${{ runner.os }}

      - name: Install kani-verifier
        if: steps.cache-kani.outputs.cache-hit != 'true'
        run: |
          cargo install --locked kani-verifier --version 0.67.0
          cargo kani setup

      - name: Run Kani proofs (kcore-sanitize)
        run: |
          cargo kani -p kcore-sanitize \
            --jobs 2 \
            --output-format terse

  trace-and-tla:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run replication trace drift checks
        run: make test-tla-trace

      - name: Install Java (for TLC)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Run bounded TLC checks (required)
        shell: bash
        run: |
          set -euo pipefail
          if command -v tlc >/dev/null 2>&1; then
            make test-tla
            exit 0
          fi
          if [[ ! -f ./tools/tla2tools.jar ]]; then
            mkdir -p ./tools
            curl -fsSL \
              https://github.com/tlaplus/tlaplus/releases/latest/download/tla2tools.jar \
              -o ./tools/tla2tools.jar
          fi
          if [[ -f ./tools/tla2tools.jar ]]; then
            env TLA2TOOLS_JAR=./tools/tla2tools.jar make test-tla
          else
            echo "::error::TLC unavailable and tla2tools.jar could not be downloaded."
            exit 1
          fi
