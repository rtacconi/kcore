<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">KCORE Hypervisor logo</title>
  <desc id="desc">A restrained enterprise-style KCORE Hypervisor logo with a geometric K inside a hexagon.</desc>
  <defs>
    <linearGradient id="edgeBlue" x1="236" y1="224" x2="788" y2="776" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#26b6e8"/>
