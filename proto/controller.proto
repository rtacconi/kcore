syntax = "proto3";

package kcore.controller;

option go_package = "github.com/kcore/kcore/api/controller";

import "google/protobuf/timestamp.proto";

// Controller service - orchestrates VMs across nodes
service Controller {
  // Node registration and heartbeat
  rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc SyncVmState(SyncVmStateRequest) returns (SyncVmStateResponse);
  
  // VM operations (forwarded to nodes)
  rpc CreateVm(CreateVmRequest) returns (CreateVmResponse);
  rpc DeleteVm(DeleteVmRequest) returns (DeleteVmResponse);
  rpc StartVm(StartVmRequest) returns (StartVmResponse);
  rpc StopVm(StopVmRequest) returns (StopVmResponse);
  rpc GetVm(GetVmRequest) returns (GetVmResponse);
  rpc ListVms(ListVmsRequest) returns (ListVmsResponse);
  
  // Node operations
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);

  // Automator: Day-0 hardware discovery
  rpc ListNodeDisks(ListNodeDisksRequest) returns (ListNodeDisksResponse);
  rpc ListNetworkInterfaces(ListNetworkInterfacesRequest) returns (ListNetworkInterfacesResponse);

  // Automator: Day-0 node provisioning
  rpc InstallNode(InstallNodeRequest) returns (InstallNodeResponse);
  rpc GetInstallStatus(GetInstallStatusRequest) returns (GetInstallStatusResponse);
  rpc ConfigureNetwork(ConfigureNetworkRequest) returns (ConfigureNetworkResponse);

  // Automator: Day-N system management
  rpc UpdateNixConfig(UpdateNixConfigRequest) returns (UpdateNixConfigResponse);
  rpc RebuildNix(RebuildNixRequest) returns (RebuildNixResponse);
  rpc UpdateSystem(UpdateSystemRequest) returns (UpdateSystemResponse);
}

message RegisterNodeRequest {
  string node_id = 1;
  string hostname = 2;
  string address = 3; // gRPC endpoint address
  NodeCapacity capacity = 4;
  repeated string labels = 5; // e.g., "dc=dc-a", "rack=rack-1"
}

message RegisterNodeResponse {
  bool success = 1;
  string message = 2;
}

message HeartbeatRequest {
  string node_id = 1;
  NodeUsage usage = 2;
}

message HeartbeatResponse {
  bool success = 1;
}

message SyncVmStateRequest {
  string node_id = 1;
  repeated VmInfo vms = 2;  // Complete list of VMs currently on this node
}

message SyncVmStateResponse {
  bool success = 1;
}

message NodeCapacity {
  int32 cpu_cores = 1;
  int64 memory_bytes = 2;
}

message NodeUsage {
  int32 cpu_cores_used = 1;
  int64 memory_bytes_used = 2;
}

// VM Operations - all include target_node for explicit node selection

message CreateVmRequest {
  string target_node = 1;  // Node address (e.g., "192.168.1.10:9091") - optional, controller picks if empty
  VmSpec spec = 2;
  string image_uri = 3;              // HTTP/HTTPS URI to download image
  string cloud_init_user_data = 4;   // Custom cloud-init #cloud-config YAML
}

message CreateVmResponse {
  string vm_id = 1;
  string node_id = 2;  // Which node created it
  VmState state = 3;
}

message DeleteVmRequest {
  string vm_id = 1;
  string target_node = 2;  // Optional - controller finds it if empty
}

message DeleteVmResponse {
  bool success = 1;
}

message StartVmRequest {
  string vm_id = 1;
  string target_node = 2;  // Optional
}

message StartVmResponse {
  VmState state = 1;
}

message StopVmRequest {
  string vm_id = 1;
  bool force = 2;
  string target_node = 3;  // Optional
}

message StopVmResponse {
  VmState state = 1;
}

message GetVmRequest {
  string vm_id = 1;
  string target_node = 2;  // Optional
}

message GetVmResponse {
  VmSpec spec = 1;
  VmStatus status = 2;
  string node_id = 3;  // Which node it's on
}

message ListVmsRequest {
  string target_node = 1;  // Optional - list from specific node, or all nodes if empty
}

message ListVmsResponse {
  repeated VmInfo vms = 1;
}

message VmInfo {
  string id = 1;
  string name = 2;
  VmState state = 3;
  int32 cpu = 4;
  int64 memory_bytes = 5;
  string node_id = 6;  // Which node it's on
  google.protobuf.Timestamp created_at = 7;
}

// Node Operations

message ListNodesRequest {}

message ListNodesResponse {
  repeated NodeInfo nodes = 1;
}

message NodeInfo {
  string node_id = 1;
  string hostname = 2;
  string address = 3;
  NodeCapacity capacity = 4;
  NodeUsage usage = 5;
  string status = 6;  // "ready", "not-ready", "unknown"
  google.protobuf.Timestamp last_heartbeat = 7;
}

message GetNodeRequest {
  string node_id = 1;
}

message GetNodeResponse {
  NodeInfo node = 1;
}

// VM Spec (simplified from node.proto)

message VmSpec {
  string id = 1;
  string name = 2;
  int32 cpu = 3;
  int64 memory_bytes = 4;
  repeated Disk disks = 5;
  repeated Nic nics = 6;
  bool enable_kcore_login = 7;
}

message Disk {
  string name = 1;
  string backend_handle = 2;
  string bus = 3;
  string device = 4;
}

message Nic {
  string network = 1;
  string model = 2;
  string mac_address = 3;
}

enum VmState {
  VM_STATE_UNKNOWN = 0;
  VM_STATE_STOPPED = 1;
  VM_STATE_RUNNING = 2;
  VM_STATE_PAUSED = 3;
  VM_STATE_ERROR = 4;
}

message VmStatus {
  string id = 1;
  VmState state = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
}

// Management API messages (controller-side)

message ApplyNixConfigRequest {
  // Full contents to write to /etc/nixos/configuration.nix
  string configuration_nix = 1;

  // When true, run `nixos-rebuild switch` after writing the file.
  // When false, only write the file.
  bool rebuild = 2;
}

message ApplyNixConfigResponse {
  bool success = 1;
  string message = 2;
}

// ControllerAdmin service provides controller-level management operations.
// For now this is intentionally unauthenticated and simple, for development use.
service ControllerAdmin {
  // ApplyNixConfig replaces the controller's /etc/nixos/configuration.nix with
  // the provided content and (optionally) triggers a nixos-rebuild.
  rpc ApplyNixConfig(ApplyNixConfigRequest) returns (ApplyNixConfigResponse);
}

// --- Automator messages (day-0 + day-N) ---

message NodeDisk {
  string name = 1;
  uint64 size_bytes = 2;
  string model = 3;
  string serial = 4;
  bool removable = 5;
  bool has_partitions = 6;
}

message ListNodeDisksRequest {
  string node_id = 1;
}

message ListNodeDisksResponse {
  repeated NodeDisk disks = 1;
  bool bootstrap_mode = 2;
}

message NetworkInterface {
  string name = 1;
  string mac_address = 2;
  string ip_address = 3;
  string subnet_mask = 4;
  bool is_up = 5;
  int64 speed_mbps = 6;
  string driver = 7;
  bool is_virtual = 8;
}

message ListNetworkInterfacesRequest {
  string node_id = 1;
}

message ListNetworkInterfacesResponse {
  repeated NetworkInterface interfaces = 1;
}

message DiskConfig {
  string device = 1;
  string role = 2; // "os" or "storage"
}

message InstallNodeRequest {
  string node_id = 1;
  repeated DiskConfig disks = 2;
  string hostname = 3;
  string root_password = 4;
  repeated string ssh_keys = 5;
  bool run_controller = 6;
  string controller_address = 7;
}

message InstallNodeResponse {
  string install_id = 1;
  string status = 2;
  string message = 3;
}

message GetInstallStatusRequest {
  string node_id = 1;
  string install_id = 2;
}

message GetInstallStatusResponse {
  string install_id = 1;
  string phase = 2;
  string message = 3;
  int32 progress_pct = 4;
}

message BridgeConfig {
  string name = 1;
  repeated string member_ports = 2;
  string ip_address = 3;
  string subnet_mask = 4;
  string gateway = 5;
  bool dhcp = 6;
}

message BondConfig {
  string name = 1;
  repeated string member_ports = 2;
  string mode = 3;
  string ip_address = 4;
  string subnet_mask = 5;
  bool dhcp = 6;
}

message VlanConfig {
  string parent_interface = 1;
  int32 vlan_id = 2;
  string ip_address = 3;
  string subnet_mask = 4;
  bool dhcp = 5;
}

message ConfigureNetworkRequest {
  string node_id = 1;
  repeated BridgeConfig bridges = 2;
  repeated BondConfig bonds = 3;
  repeated VlanConfig vlans = 4;
  string dns_servers = 5;
  bool apply_now = 6;
}

message ConfigureNetworkResponse {
  bool success = 1;
  string message = 2;
  string generated_nix_snippet = 3;
}

message UpdateNixConfigRequest {
  string node_id = 1;
  string configuration_nix = 2;
}

message UpdateNixConfigResponse {
  bool success = 1;
  string message = 2;
}

message RebuildNixRequest {
  string node_id = 1;
  string strategy = 2; // "switch", "boot", "test", "dry-build"
}

message RebuildNixResponse {
  bool success = 1;
  string message = 2;
  string build_output = 3;
}

message UpdateSystemRequest {
  string node_id = 1;
  bool update_channels = 2;
  bool rebuild = 3;
  bool update_agent = 4;
}

message UpdateSystemResponse {
  bool success = 1;
  string message = 2;
}

